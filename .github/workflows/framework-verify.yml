name: framework-verify

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run framework-verify
        run: bash scripts/framework-verify.sh

      - name: Consumer smoke
        run: bash scripts/smoke-consumer.sh
